# Dogfood flow for the expectation-match wedge.
# Walker is expected to author a prior_plan BEFORE the first browser_navigate;
# the walk surfaces deviations + affordance gaps when reality diverges from the
# saas-dashboard archetype prior.
#
# See: docs/proposals/expectation-match.md (DoD § Dogfood spec)

flow_id: rove.setup_new_project
goal: "Sign in to Rove and set up a brand-new project called 'demo-project', then verify the project is selectable in the project switcher."
entry_route: "/"

budget:
  max_steps: 16
  max_seconds: 180

prior_overrides:
  archetype: saas-dashboard
  # The dashboard intentionally exposes "Project" as a top-nav new-item rather
  # than a list-then-create flow. Don't flag the absence of a "+ New" tile
  # on a fictional /projects index — the architecture is intentional.
  do_not_expect:
    - "list view of all projects with a + New CTA"
  # We DO expect an in-flow archetype affordance per the proposal; flag if
  # there is no way to pick or signal an archetype at any point.
  do_expect:
    - "archetype or project-shape hint visible somewhere during project creation or settings"

success_predicate:
  - "Project creation form is reachable from the top nav without prior auth knowledge"
  - "After submit, the newly-created project becomes the active project in the switcher"
  - "Reload preserves the active project (cookie or URL state)"

# No explicit steps — free-roam walk. Persona will plan first, navigate, encounter
# whatever the dashboard surfaces, and verdict each step against its frozen prior_plan.
steps: []
